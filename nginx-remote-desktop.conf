# Remote Desktop Web — раздача страницы + прокси WebSocket на Python (порт 8080)
# Скопировать: sudo cp nginx-remote-desktop.conf /etc/nginx/sites-available/remote-desktop
# Включить:   sudo ln -sf /etc/nginx/sites-available/remote-desktop /etc/nginx/sites-enabled/
# Проверить:  sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name _;
    root /var/www/remote-desktop;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /client {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    location /host {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }

    location /admin {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
    }
}
